<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contactez la Rédaction - Volte</title>
    <style>
        body { font-family: sans-serif; line-height: 1.6; max-width: 800px; margin: 40px auto; padding: 0 20px; color: #333; }
        h1 { color: #111; border-bottom: 2px solid #eee; padding-bottom: 10px; }
        form { margin-top: 20px; display: flex; flex-direction: column; max-width: 500px; }
        label { margin-top: 10px; font-weight: bold; }
        input, textarea { padding: 10px; margin-top: 5px; border: 1px solid #ccc; border-radius: 4px; font-size: 14px; }
        button { margin-top: 20px; padding: 12px; background: #111; color: #fff; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; }
        button:hover { background: #333; }
    </style>
</head>
<body>
    <h1>Contactez la Rédaction</h1>
    <p>Une question, une suggestion ou un partenariat ? Utilisez le formulaire ci-dessous pour nous écrire. L'équipe de <strong>Volte</strong> vous répondra dans les plus brefs délais.</p>

    <form action="https://formsubmit.co/[Ton-Email-Ici]" method="POST">
        <label for="name">Votre Nom</label>
        <input type="text" id="name" name="name" required placeholder="Ex: Adrien">

        <label for="email">Votre Adresse Email</label>
        <input type="email" id="email" name="email" required placeholder="Ex: adrien@example.com">

        <label for="message">Votre Message</label>
        <textarea id="message" name="message" rows="6" required placeholder="Écrivez votre message ici..."></textarea>

        <button type="submit">Envoyer le message</button>
    </form>
    <button id="backToTop" title="Retour en haut" aria-label="Retour en haut de la page">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24">
        <path d="M12 4l-8 8h6v8h4v-8h6z" fill="currentColor"/>
    </svg>
</button>

<style>
#backToTop {
    /* Positionnement fixe pour qu'il suive le défilement */
    position: fixed;
    bottom: 30px;
    right: 30px;
    z-index: 999; /* Passe au-dessus de tout le contenu */
    
    /* Dimensions et forme circulaire */
    width: 48px;
    height: 48px;
    border-radius: 50%;
    
    /* Centrage parfait de l'icône */
    display: flex;
    align-items: center;
    justify-content: center;
    
    /* --- COULEUR DE FOND (VERT SEMI-TRANSPARENT) --- */
    /* Note : Tu peux remplacer #04a75b par le code couleur exact de ton site */
    background-color: rgba(4, 167, 91, 0.85); 
    color: #ffffff; /* Flèche blanche */
    border: 1px solid rgba(255, 255, 255, 0.1);
    cursor: pointer;
    
    /* Ombres et effet flou d'arrière-plan (Glassmorphism) */
    box-shadow: 0 4px 12px rgba(4, 167, 91, 0.3); /* Ombre légèrement teintée en vert */
    backdrop-filter: blur(4px);
    -webkit-backdrop-filter: blur(4px);
    
    /* ÉTAT INITIAL : Invisible et décalé vers le bas */
    opacity: 0;
    visibility: hidden;
    transform: translateY(15px);
    
    /* Gestion des transitions */
    transition: opacity 0.3s ease, visibility 0.3s ease, transform 0.3s cubic-bezier(0.4, 0, 0.2, 1), background-color 0.2s ease;
}

/* ÉTAT ACTIF : Activé au scroll par le JavaScript */
#backToTop.visible {
    opacity: 1;
    visibility: visible;
    transform: translateY(0);
}

/* Interaction au survol (Hover) */
#backToTop:hover {
    background-color: rgba(3, 143, 77, 1); /* Vert un peu plus soutenu et 100% opaque */
    transform: translateY(-4px); /* Effet d'élévation */
    box-shadow: 0 6px 16px rgba(4, 167, 91, 0.5);
}

/* Interaction au clic (Active) */
#backToTop:active {
    transform: translateY(-1px);
}

/* Assure un défilement fluide natif sur tout le site */
html {
    scroll-behavior: smooth;
}
</style>

<script>
const btnBackToTop = document.getElementById("backToTop");

window.onscroll = function() {
    controlBackToTopButton();
};

function controlBackToTopButton() {
    if (document.body.scrollTop > 300 || document.documentElement.scrollTop > 300) {
        btnBackToTop.classList.add("visible");
    } else {
        btnBackToTop.classList.remove("visible");
    }
}

btnBackToTop.addEventListener("click", function() {
    window.scrollTo({
        top: 0,
        behavior: "smooth"
    });
});
</script>
</body>
</html>
