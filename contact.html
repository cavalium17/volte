<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contactez la Rédaction - Volte</title>
    <style>
        body { font-family: sans-serif; line-height: 1.6; max-width: 800px; margin: 40px auto; padding: 0 20px; color: #333; }
        h1 { color: #111; border-bottom: 2px solid #eee; padding-bottom: 10px; }
        form { margin-top: 20px; display: flex; flex-direction: column; max-width: 500px; }
        label { margin-top: 10px; font-weight: bold; }
        input, textarea { padding: 10px; margin-top: 5px; border: 1px solid #ccc; border-radius: 4px; font-size: 14px; }
        button { margin-top: 20px; padding: 12px; background: #111; color: #fff; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; }
        button:hover { background: #333; }
    </style>
</head>
<body>
    <h1>Contactez la Rédaction</h1>
    <p>Une question, une suggestion ou un partenariat ? Utilisez le formulaire ci-dessous pour nous écrire. L'équipe de <strong>Volte</strong> vous répondra dans les plus brefs délais.</p>

    <form action="https://formsubmit.co/[Ton-Email-Ici]" method="POST">
        <label for="name">Votre Nom</label>
        <input type="text" id="name" name="name" required placeholder="Ex: Adrien">

        <label for="email">Votre Adresse Email</label>
        <input type="email" id="email" name="email" required placeholder="Ex: adrien@example.com">

        <label for="message">Votre Message</label>
        <textarea id="message" name="message" rows="6" required placeholder="Écrivez votre message ici..."></textarea>

        <button type="submit">Envoyer le message</button>
    </form>
    <button id="backToTop" title="Retour en haut">↑</button>

<style>
#backToTop {
    display: none; /* Caché par défaut */
    position: fixed; /* Reste visible au défilement */
    bottom: 20px; /* À 20px du bas */
    right: 20px; /* À 20px de la droite */
    z-index: 99; /* Reste au-dessus des autres éléments */
    border: none;
    outline: none;
    background-color: #111; /* Couleur noire élégante */
    color: white;
    cursor: pointer;
    padding: 12px 16px;
    border-radius: 4px; /* Légèrement arrondi */
    font-size: 18px;
    font-weight: bold;
    transition: background-color 0.3s, opacity 0.3s;
    box-shadow: 0 2px 5px rgba(0,0,0,0.2);
}

#backToTop:hover {
    background-color: #333; /* Devient un peu plus clair au survol */
}

/* Effet de défilement fluide pour tout le site */
html {
    scroll-behavior: smooth;
}
</style>

<script>
// Récupérer le bouton
const btnBackToTop = document.getElementById("backToTop");

// Écouter le défilement de la page
window.onscroll = function() {
    scrollFunction();
};

function scrollFunction() {
    // Si on a descendu de plus de 300px, on affiche le bouton, sinon on le cache
    if (document.body.scrollTop > 300 || document.documentElement.scrollTop > 300) {
        btnBackToTop.style.display = "block";
    } else {
        btnBackToTop.style.display = "none";
    }
}

// Quand on clique sur le bouton, on remonte tout en haut
btnBackToTop.addEventListener("click", function() {
    window.scrollTo({
        top: 0,
        behavior: "smooth" /* Remontée fluide animée */
    });
});
</script>
</body>
</html>
